name: public_beat
description: A stunning Spotify + Apple Music hybrid player using YouTube as a free audio backend.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  just_audio: ^0.9.36
  youtube_explode_dart: any
  provider: ^6.1.2
  audio_video_progress_bar: ^2.0.3
  shared_preferences: ^2.2.2
  google_fonts: ^6.2.1
  http: ^1.2.0
  rxdart: ^0.27.7
  just_audio_background: ^0.0.1-beta.17
  permission_handler: ^12.0.3
  file_picker: ^11.0.2
  disk_space_2: ^1.0.12
  video_player: ^2.10.1
  speech_to_text: ^7.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  rename: ^3.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/public-beat-launcher.png"
